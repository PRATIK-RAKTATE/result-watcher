<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result Watcher Logs // TERMINAL_v2.4</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
    
    :root {
      --terminal-green: #00ff41;
      --terminal-green-dim: #00aa2a;
      --terminal-green-glow: rgba(0, 255, 65, 0.6);
      --terminal-bg: #0a0a0a;
      --terminal-bg-light: #111;
      --error-red: #ff0040;
      --warn-amber: #ffb000;
      --info-white: #e0e0e0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--terminal-bg);
      color: var(--terminal-green);
      font-family: 'VT323', 'Share Tech Mono', 'Courier New', monospace;
      font-size: 18px;
      line-height: 1.4;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* CRT Scanline Effect */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(18, 16, 16, 0) 50%,
        rgba(0, 0, 0, 0.25) 50%
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 10;
      animation: scanline 8s linear infinite;
    }

    /* CRT Flicker */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 255, 65, 0.02);
      opacity: 0;
      pointer-events: none;
      z-index: 11;
      animation: flicker 0.15s infinite;
    }

    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    @keyframes flicker {
      0% { opacity: 0.02; }
      50% { opacity: 0.05; }
      100% { opacity: 0.02; }
    }

    /* Screen Glow */
    .screen-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        ellipse at center,
        rgba(0, 255, 65, 0.05) 0%,
        rgba(0, 0, 0, 0) 70%
      );
      pointer-events: none;
      z-index: 9;
    }

    /* Header */
    header {
      background: var(--terminal-bg-light);
      border-bottom: 2px solid var(--terminal-green);
      padding: 15px 20px;
      position: sticky;
      top: 0;
      z-index: 5;
      box-shadow: 0 0 20px var(--terminal-green-glow);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      font-size: 28px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--terminal-green-glow);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1::before {
      content: ">";
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .status-bar {
      display: flex;
      gap: 20px;
      font-size: 16px;
      flex-wrap: wrap;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      background: var(--terminal-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--terminal-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Terminal Window */
    .terminal-window {
      background: var(--terminal-bg-light);
      border: 2px solid var(--terminal-green);
      border-radius: 4px;
      box-shadow: 
        0 0 20px rgba(0, 255, 65, 0.3),
        inset 0 0 20px rgba(0, 255, 65, 0.05);
      overflow: hidden;
      position: relative;
    }

    .terminal-header {
      background: rgba(0, 255, 65, 0.1);
      padding: 8px 15px;
      border-bottom: 1px solid var(--terminal-green);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .terminal-controls {
      display: flex;
      gap: 8px;
    }

    .control-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid var(--terminal-green);
    }

    .control-btn:nth-child(1) { background: var(--terminal-green); }
    .control-btn:nth-child(2) { background: transparent; }
    .control-btn:nth-child(3) { background: transparent; }

    /* Log Display */
    #logs {
      padding: 20px;
      min-height: 60vh;
      max-height: 70vh;
      overflow-y: auto;
      font-size: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      scrollbar-width: thin;
      scrollbar-color: var(--terminal-green) var(--terminal-bg);
    }

    #logs::-webkit-scrollbar {
      width: 10px;
    }

    #logs::-webkit-scrollbar-track {
      background: var(--terminal-bg);
    }

    #logs::-webkit-scrollbar-thumb {
      background: var(--terminal-green);
      border-radius: 0;
    }

    /* Log Level Colors */
    .log-entry {
      margin-bottom: 4px;
      text-shadow: 0 0 5px currentColor;
    }

    .error { 
      color: var(--error-red); 
      text-shadow: 0 0 8px rgba(255, 0, 64, 0.6);
    }

    .warn { 
      color: var(--warn-amber); 
      text-shadow: 0 0 8px rgba(255, 176, 0, 0.6);
    }

    .info { 
      color: var(--info-white); 
    }

    .timestamp {
      color: var(--terminal-green-dim);
    }

    .level-tag {
      font-weight: bold;
      padding: 0 4px;
    }

    /* Input Line */
    .input-line {
      padding: 10px 20px;
      border-top: 1px solid var(--terminal-green);
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prompt {
      color: var(--terminal-green);
      font-weight: bold;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 18px;
      background: var(--terminal-green);
      animation: blink-cursor 1s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink-cursor {
      50% { opacity: 0; }
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      body {
        font-size: 14px;
      }

      header {
        padding: 10px 15px;
      }

      h1 {
        font-size: 20px;
        letter-spacing: 1px;
      }

      .status-bar {
        font-size: 12px;
        gap: 10px;
        width: 100%;
        justify-content: flex-start;
      }

      .container {
        padding: 10px;
      }

      #logs {
        padding: 12px;
        font-size: 13px;
        min-height: 50vh;
        max-height: 60vh;
      }

      .terminal-header {
        padding: 6px 12px;
        font-size: 12px;
      }

      .input-line {
        padding: 8px 12px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 16px;
      }

      .status-bar {
        display: none; /* Hide status on very small screens */
      }

      #logs {
        font-size: 12px;
        line-height: 1.3;
      }
    }

    /* Boot Animation */
    @keyframes boot-text {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .boot-sequence {
      animation: boot-text 0.3s ease-out forwards;
    }
  </style>
</head>
<body>
  <div class="screen-glow"></div>
  
  <header>
    <div class="header-content">
      <h1>Result Watcher Logs</h1>
      <div class="status-bar">
        <div class="status-item">
          <span class="status-indicator"></span>
          <span>SYSTEM ONLINE</span>
        </div>
        <div class="status-item">CONN: <span id="conn-status">ESTABLISHED</span></div>
        <div class="status-item">REFRESH: 2s</div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="terminal-window">
      <div class="terminal-header">
        <span>root@watcher:~# live-monitor</span>
        <div class="terminal-controls">
          <div class="control-btn"></div>
          <div class="control-btn"></div>
          <div class="control-btn"></div>
        </div>
      </div>
      
      <pre id="logs">Initializing system...
Loading log modules...
Establishing connection to API endpoint...
<span class="boot-sequence">READY_</span></pre>
      
      <div class="input-line">
        <span class="prompt">root@watcher:~$</span>
        <span style="color: var(--terminal-green-dim);">tail -f /var/log/system.log</span>
        <span class="cursor"></span>
      </div>
    </div>
  </div>

  <script>
    /**
     * 🔥 CHANGE THIS BASE URL
     * Local: ""
     * Production: "https://your-domain.com"
     */
    const API_BASE = "https://result-watcher.onrender.com"; 
    // const API_BASE = "https://result-watcher.onrender.com";

    const logsContainer = document.getElementById("logs");
    const connStatus = document.getElementById("conn-status");

    function getTimestamp() {
      const now = new Date();
      return now.toISOString().split('T')[1].split('.')[0];
    }

    function formatLogEntry(l) {
      const time = `<span class="timestamp">[${l.time || getTimestamp()}]</span>`;
      const level = `<span class="level-tag ${l.level.toLowerCase()}">${l.level.toUpperCase()}</span>`;
      const msg = l.message;
      return `<div class="log-entry">${time} ${level} ${msg}</div>`;
    }

    async function fetchLogs() {
      try {
        const res = await fetch(`${API_BASE}/logs`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const formatted = data.map(l => formatLogEntry(l)).join("");
        logsContainer.innerHTML = formatted;
        
        // Auto-scroll to bottom
        logsContainer.scrollTop = logsContainer.scrollHeight;
        
        connStatus.textContent = "ESTABLISHED";
        connStatus.style.color = "var(--terminal-green)";
      } catch (err) {
        connStatus.textContent = "DROPPED";
        connStatus.style.color = "var(--error-red)";
        
        const errorEntry = `<div class="log-entry error">[${getTimestamp()}] <span class="level-tag error">ERROR</span> Connection failed: ${err.message}</div>`;
        logsContainer.innerHTML += errorEntry;
      }
    }

    // Initial fetch
    setTimeout(() => {
      fetchLogs();
      setInterval(fetchLogs, 2000);
    }, 1000);
  </script>
</body>
</html>
